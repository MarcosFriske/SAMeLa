{% extends 'layout.html' %}

{% block title %}Editar Instrumento de Avaliação{% endblock %}

{% block content %}
    <div class="container">
        <h2>Editar Instrumento de Avaliação</h2>
        <form method="post" action="/editar_instrumento/{{ instrumento.id_instrumento_avaliacao }}">
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome" value="{{ instrumento.nome }}" required><br>

            <label for="descricao">Descrição:</label><br>
            <textarea id="descricao" name="descricao" required>{{ instrumento.descricao }}</textarea><br>

            <label for="ativo">Ativo:</label><br>
            <input type="checkbox" id="ativo" name="ativo" {% if instrumento.ativo %} checked {% endif %}><br><br>

            <input type="submit" value="Atualizar Instrumento">
        </form>
    </div>
{% endblock %}
