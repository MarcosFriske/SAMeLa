<nav aria-label="Page navigation">
<ul class="pagination justify-content-center">

{% if pagina > 1 %}

<li class="page-item">
<a class="page-link"
href="#"
onclick="searchCriterios({{ pagina - 1 }})">
&laquo;
</a>
</li>

{% endif %}

{% for i in range(1, total_paginas + 1) %}

<li class="page-item {% if i == pagina %}active{% endif %}">
<a class="page-link"
href="#"
onclick="searchCriterios({{ i }})">
{{ i }}
</a>
</li>

{% endfor %}

{% if pagina < total_paginas %}

<li class="page-item">
<a class="page-link"
href="#"
onclick="searchCriterios({{ pagina + 1 }})">
&raquo;
</a>
</li>

{% endif %}

</ul>
</nav>
