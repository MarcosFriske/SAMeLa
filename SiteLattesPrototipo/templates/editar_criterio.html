{% extends 'layout.html' %}

{% block title %}Editar Critério{% endblock %}

{% block content %}
    <div class="container">
        <h2>Editar Critério</h2>
        <form method="post" action="/editar_criterio/{{ criterio.id_criterio }}">
            <div class="form-group">
                <label for="criterio">Critério:</label>
                <input type="text" id="criterio" name="criterio" class="form-control" value="{{ criterio.criterio }}" required>
            </div>

            <div class="form-group">
                <label for="qtd_maxima_itens">Quantidade Máxima de Itens:</label>
                <input type="number" id="qtd_maxima_itens" name="qtd_maxima_itens" class="form-control" min="0" value="{{ criterio.qtd_maxima_itens }}" required>
            </div>

            <div class="form-group">
                <label for="pontuacao_item">Pontuação por Item:</label>
                <input type="number" step="0.01" id="pontuacao_item" name="pontuacao_item" class="form-control" min="0" value="{{ criterio.pontuacao_item }}" required>
            </div>

            <div class="form-group">
                <label for="xpath_criterio_lattes">XPath do Critério:</label>
                <textarea
                    id="xpath_criterio_lattes"
                    name="xpath_criterio_lattes"
                    class="form-control xpath-editor"
                    rows="6"
                    required
                >{{ criterio.xpath_criterio_lattes }}</textarea>
            </div>

            <div class="form-group">
                <label for="considera_qualis">Considera Qualis:</label>
                <input type="checkbox" id="considera_qualis" name="considera_qualis" {% if criterio.considera_qualis %} checked {% endif %}>
            </div>

            <div class="form-group">
                <label for="ativo">Ativo:</label>
                <input type="checkbox" id="ativo" name="ativo" {% if criterio.ativo %} checked {% endif %}>
            </div>

            <button type="submit" class="btn btn-primary">Atualizar Critério</button>
        </form>
    </div>
{% endblock %}

<style>
.xpath-editor {
    font-family: monospace;
    font-size: 14px;
    white-space: pre;
    resize: vertical;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const textarea = document.getElementById("xpath_criterio_lattes");

    textarea.addEventListener("keydown", function(e) {
        if (e.key === "Tab") {
            e.preventDefault();

            const start = this.selectionStart;
            const end = this.selectionEnd;

            this.value = this.value.substring(0, start) + "    " + this.value.substring(end);

            this.selectionStart = this.selectionEnd = start + 4;
        }
    });
});
</script>
