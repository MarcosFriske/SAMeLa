<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
    <style>
        body {
            background-color: #f8f9fa; /* Cor de fundo da página */
        }

        .reset-password-box {
            background-color: #ffffff; /* Cor de fundo do bloco de redefinição de senha */
            border: 1px solid #ced4da; /* Borda do bloco de redefinição de senha */
            border-radius: 5px; /* Cantos arredondados do bloco */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Sombra do bloco */
            max-width: 400px; /* Largura máxima do bloco */
            margin: 50px auto; /* Centraliza o bloco na página */
            padding: 20px; /* Espaçamento interno do bloco */
        }

        .reset-password-box h2 {
            color: #007bff; /* Cor do título "Redefinir Senha" */
            text-align: center;
        }

        .reset-password-box form {
            margin-top: 20px;
        }

        .form-group label {
            font-weight: bold;
        }

        .form-control {
            margin-bottom: 15px;
        }

        .btn-primary {
            background-color: #007bff; /* Cor do botão "Redefinir Senha" */
            border: 1px solid #007bff;
        }

        .btn-primary:hover {
            background-color: #0056b3; /* Cor do botão ao passar o mouse */
            border: 1px solid #0056b3;
        }

        .alert {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="reset-password-box">
        <img src="{{ url_for('static', filename='images/Logo_IFC_horizontal_Camboriu.png') }}" alt="IFC Camboriú Logo" class="logo-container img-fluid mx-auto d-block">
        <h2>Redefinir Senha</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-dismissible fade show" role="alert">
                    {% for message in messages %}
                        {{ message }}
                    {% endfor %}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
            {% endif %}
        {% endwith %}
        <form method="post" action="{{ url_for('reset_password', token=token) }}">
            <div class="form-group">
                <label for="new_password">Nova Senha:</label>
                <input type="password" class="form-control" name="new_password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirme a Nova Senha:</label>
                <input type="password" class="form-control" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Redefinir Senha</button>
        </form>
    </div>
    <!-- Scripts do Bootstrap e do jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"></script>
</body>
</html>
