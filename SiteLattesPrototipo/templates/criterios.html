{% extends 'layout.html' %}

{% block title %}Critérios de Avaliação{% endblock %}

{% block content %}

<div class="container-fluid">

<h2>Critérios de Avaliação</h2>

<div class="form-group">
<label for="pesquisa">Pesquisar Critérios:</label>
<input
type="text"
id="pesquisa"
class="form-control"
placeholder="Digite para pesquisar..."
onkeyup="searchCriterios()"
>
</div>

<table class="table mt-3" style="table-layout: fixed; width:100%">

<thead>
<tr>
<th>Critério</th>
<th>Qtd Máx</th>
<th>Pontuação</th>
<th>XPath</th>
<th>Qualis</th>
<th>Ativo</th>
<th>Editar</th>
<th>Remover</th>
</tr>
</thead>

<tbody id="tabela-criterios">

{% include 'tabela_criterios.html' %}

</tbody>

</table>

<div class="mt-3 d-flex justify-content-around">
<a href="/criar_criterio" class="btn btn-primary">
Adicionar Novo Critério
</a>
</div>

</div>

<script>

function searchCriterios(){

let pesquisa = document.getElementById('pesquisa').value

fetch('/criterios?pesquisa=' + pesquisa,{
headers:{
'X-Requested-With':'XMLHttpRequest'
}
})
.then(response => response.text())
.then(data =>{

document.getElementById('tabela-criterios').innerHTML = data

})

}

</script>

{% endblock %}
